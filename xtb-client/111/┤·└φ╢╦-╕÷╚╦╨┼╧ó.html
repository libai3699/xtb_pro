<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校推宝Pro - 代理端个人信息</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #f6f6f6;
            overflow: hidden;
        }
        .container {
            width: 375px;
            height: 812px;
            background: white;
            position: relative;
            overflow: hidden;
        }
        .mockup {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            border: 12px solid #000;
            border-radius: 40px;
            box-sizing: border-box;
        }
        .status-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: white;
            font-size: 14px;
        }
        .content {
            height: calc(100% - 44px - 60px);
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .content::-webkit-scrollbar {
            display: none;
        }
        .tab-bar {
            background: white;
            height: 60px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-around;
            opacity: 1;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-size: 12px;
        }
        .tab-item.active {
            color: #764ba2;
        }
        .header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
        }
        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
        }
        .page-subtitle {
            color: #6b7280;
            font-size: 14px;
        }
        .profile-section {
            padding: 20px;
            background: white;
            margin-bottom: 8px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 16px;
        }
        .avatar-upload {
            text-align: center;
            margin-bottom: 24px;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            margin-bottom: 12px;
            position: relative;
        }
        .avatar-edit {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 24px;
            height: 24px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .form-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 12px center;
            background-repeat: no-repeat;
            background-size: 16px;
            padding-right: 40px;
        }
        .save-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f3f4f6;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-label {
            color: #6b7280;
            font-size: 14px;
        }
        .info-value {
            color: #1f2937;
            font-weight: 500;
        }
        .info-edit {
            color: #667eea;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mockup"></div>
        
        <!-- 状态栏 -->
        <div class="status-bar">
            <div>9:41</div>
            <div>
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-three-quarters"></i>
            </div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <!-- 页面标题 -->
            <div class="header">
                <h1 class="page-title">个人信息</h1>
                <p class="page-subtitle">管理您的个人资料和账户信息</p>
            </div>
            
            <!-- 头像上传 -->
            <div class="profile-section">
                <div class="avatar-upload">
                    <div class="avatar">
                        <i class="fas fa-user"></i>
                        <div class="avatar-edit">
                            <i class="fas fa-camera"></i>
                        </div>
                    </div>
                    <div style="color: #667eea; font-size: 14px; cursor: pointer;">
                        <i class="fas fa-camera mr-1"></i>更换头像
                    </div>
                </div>
                
                <!-- 基本信息 -->
                <div class="form-group">
                    <label class="form-label">姓名</label>
                    <input type="text" class="form-input" value="张三" placeholder="请输入您的姓名">
                </div>
                
                <div class="form-group">
                    <label class="form-label">手机号码</label>
                    <input type="tel" class="form-input" value="138****5678" placeholder="请输入手机号码">
                </div>
                
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-input" value="zhangsan@example.com" placeholder="请输入邮箱地址">
                </div>
                
                <div class="form-group">
                    <label class="form-label">性别</label>
                    <select class="form-input form-select">
                        <option value="male">男</option>
                        <option value="female">女</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">出生日期</label>
                    <input type="date" class="form-input" value="1990-01-01">
                </div>
                
                <div class="form-group">
                    <label class="form-label">所在地区</label>
                    <input type="text" class="form-input" value="北京市海淀区" placeholder="请输入所在地区">
                </div>
                
                <div class="form-group">
                    <label class="form-label">个人简介</label>
                    <textarea class="form-input" rows="3" placeholder="请输入个人简介">拥有5年教育行业推广经验，擅长线上线下活动策划与执行，熟悉高校市场特点。</textarea>
                </div>
                
                <button class="save-btn">
                    <i class="fas fa-save mr-2"></i>保存修改
                </button>
            </div>
            
            <!-- 账户信息 -->
            <div class="profile-section">
                <div class="section-title">账户信息</div>
                <div class="info-item">
                    <span class="info-label">账户ID</span>
                    <span class="info-value">AG20240315001</span>
                </div>
                <div class="info-item">
                    <span class="info-label">注册时间</span>
                    <span class="info-value">2024-01-15</span>
                </div>
                <div class="info-item">
                    <span class="info-label">账户状态</span>
                    <span class="info-value" style="color: #10b981;">正常</span>
                </div>
                <div class="info-item">
                    <span class="info-label">认证状态</span>
                    <span class="info-value" style="color: #10b981;">已认证</span>
                </div>
            </div>
            
            <!-- 推广信息 -->
            <div class="profile-section">
                <div class="section-title">推广信息</div>
                <div class="info-item">
                    <span class="info-label">累计推广活动</span>
                    <span class="info-value">15个</span>
                </div>
                <div class="info-item">
                    <span class="info-label">成功推广人数</span>
                    <span class="info-value">156人</span>
                </div>
                <div class="info-item">
                    <span class="info-label">平均评分</span>
                    <span class="info-value">4.8分</span>
                </div>
                <div class="info-item">
                    <span class="info-label">累计收益</span>
                    <span class="info-value" style="color: #10b981;">¥2,850</span>
                </div>
            </div>
        </div>
        
        <!-- 底部导航栏 -->
        <div class="tab-bar">
            <div class="tab-item">
                <i class="fas fa-home text-xl mb-1"></i>
                <span>首页</span>
            </div>
            <div class="tab-item">
                <i class="fas fa-tasks text-xl mb-1"></i>
                <span>任务</span>
            </div>
            <div class="tab-item">
                <i class="fas fa-chart-line text-xl mb-1"></i>
                <span>推广</span>
            </div>
            <div class="tab-item active">
                <i class="fas fa-user text-xl mb-1"></i>
                <span>我的</span>
            </div>
        </div>
    </div>
</body>
</html>
