<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校推宝Pro - 机构端代理管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #f6f6f6;
            overflow: hidden;
        }
        .container {
            width: 375px;
            height: 812px;
            background: white;
            position: relative;
            overflow: hidden;
        }
        .mockup {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            border: 12px solid #000;
            border-radius: 40px;
            box-sizing: border-box;
        }
        .status-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: white;
            font-size: 14px;
        }
        .content {
            height: calc(100% - 44px - 60px);
            overflow-y: auto;
            padding: 16px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .content::-webkit-scrollbar {
            display: none;
        }
        .tab-bar {
            background: white;
            height: 60px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-around;
            opacity: 1;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-size: 12px;
        }
        .tab-item.active {
            color: #764ba2;
        }
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            background: white;
            font-size: 14px;
            white-space: nowrap;
        }
        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .agent-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .agent-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        .agent-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            margin-right: 12px;
        }
        .agent-info {
            flex: 1;
        }
        .agent-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        .agent-school {
            color: #6b7280;
            font-size: 14px;
        }
        .agent-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-active {
            background: #d1fae5;
            color: #065f46;
        }
        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }
        .agent-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }
        .stat-item {
            text-align: center;
            padding: 8px;
            background: #f8fafc;
            border-radius: 8px;
        }
        .stat-value {
            font-weight: 600;
            font-size: 18px;
            color: #667eea;
        }
        .stat-label {
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mockup"></div>
        
        <!-- 状态栏 -->
        <div class="status-bar">
            <div>9:41</div>
            <div>
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-three-quarters"></i>
            </div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <!-- 页面标题 -->
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-gray-800">代理管理</h1>
                <div class="text-sm text-gray-500">共156名代理</div>
            </div>
            
            <!-- 筛选栏 -->
            <div class="filter-bar">
                <button class="filter-btn active">全部</button>
                <button class="filter-btn">待审核</button>
                <button class="filter-btn">活跃中</button>
                <button class="filter-btn">按学校</button>
                <button class="filter-btn">按活跃度</button>
            </div>
            
            <!-- 代理列表 -->
            <div class="agent-list">
                <div class="agent-card">
                    <div class="agent-header">
                        <div class="agent-avatar">张</div>
                        <div class="agent-info">
                            <div class="agent-name">张三</div>
                            <div class="agent-school">北京大学 · 计算机学院</div>
                        </div>
                        <div class="agent-status status-active">活跃</div>
                    </div>
                    <div class="agent-stats">
                        <div class="stat-item">
                            <div class="stat-value">8</div>
                            <div class="stat-label">推广活动</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">156</div>
                            <div class="stat-label">参与人数</div>
                        </div>
                    </div>
                </div>
                
                <div class="agent-card">
                    <div class="agent-header">
                        <div class="agent-avatar">李</div>
                        <div class="agent-info">
                            <div class="agent-name">李四</div>
                            <div class="agent-school">清华大学 · 经济学院</div>
                        </div>
                        <div class="agent-status status-pending">待审核</div>
                    </div>
                    <div class="agent-stats">
                        <div class="stat-item">
                            <div class="stat-value">0</div>
                            <div class="stat-label">推广活动</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">0</div>
                            <div class="stat-label">参与人数</div>
                        </div>
                    </div>
                </div>
                
                <div class="agent-card">
                    <div class="agent-header">
                        <div class="agent-avatar">王</div>
                        <div class="agent-info">
                            <div class="agent-name">王五</div>
                            <div class="agent-school">复旦大学 · 外语学院</div>
                        </div>
                        <div class="agent-status status-active">活跃</div>
                    </div>
                    <div class="agent-stats">
                        <div class="stat-item">
                            <div class="stat-value">12</div>
                            <div class="stat-label">推广活动</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">289</div>
                            <div class="stat-label">参与人数</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 底部导航栏 -->
        <div class="tab-bar">
            <div class="tab-item">
                <i class="fas fa-home text-xl mb-1"></i>
                <span>首页</span>
            </div>
            <div class="tab-item active">
                <i class="fas fa-users text-xl mb-1"></i>
                <span>代理</span>
            </div>
            <div class="tab-item">
                <i class="fas fa-tasks text-xl mb-1"></i>
                <span>任务</span>
            </div>
            <div class="tab-item">
                <i class="fas fa-user text-xl mb-1"></i>
                <span>我的</span>
            </div>
        </div>
    </div>
</body>
</html>
