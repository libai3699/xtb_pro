<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校推宝Pro - 机构端智能看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #f6f6f6;
            overflow: hidden;
        }
        .container {
            width: 375px;
            height: 812px;
            background: white;
            position: relative;
            overflow: hidden;
        }
        .mockup {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            border: 12px solid #000;
            border-radius: 40px;
            box-sizing: border-box;
        }
        .status-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: white;
            font-size: 14px;
        }
        .content {
            height: calc(100% - 44px - 60px);
            overflow-y: auto;
            padding: 16px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .content::-webkit-scrollbar {
            display: none;
        }
        .tab-bar {
            background: white;
            height: 60px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-around;
            opacity: 1;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-size: 12px;
        }
        .tab-item.active {
            color: #764ba2;
        }
        .metric-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 20px;
            color: white;
            margin-bottom: 16px;
        }
        .metric-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .metric-label {
            font-size: 14px;
            opacity: 0.9;
        }
        .activity-stream {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .activity-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f3f4f6;
        }
        .activity-item:last-child {
            border-bottom: none;
        }
        .activity-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #f0f4ff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            color: #667eea;
        }
        .activity-content {
            flex: 1;
        }
        .activity-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .activity-time {
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mockup"></div>
        
        <!-- 状态栏 -->
        <div class="status-bar">
            <div>9:41</div>
            <div>
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-three-quarters"></i>
            </div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <!-- 核心指标卡片 -->
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="metric-card">
                    <div class="metric-value">12</div>
                    <div class="metric-label">推广中活动</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value">156</div>
                    <div class="metric-label">校园代理</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value">892</div>
                    <div class="metric-label">活动报名</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value">45</div>
                    <div class="metric-label">今日签到</div>
                </div>
            </div>
            
            <!-- 实时动态流 -->
            <div class="activity-stream">
                <h3 class="text-lg font-semibold mb-4">实时动态</h3>
                <div class="activity-item">
                    <div class="activity-icon">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <div class="activity-content">
                        <div class="activity-title">新增代理申请</div>
                        <div class="activity-time">2分钟前</div>
                    </div>
                </div>
                <div class="activity-item">
                    <div class="activity-icon">
                        <i class="fas fa-clipboard-check"></i>
                    </div>
                    <div class="activity-content">
                        <div class="activity-title">活动报名成功</div>
                        <div class="activity-time">5分钟前</div>
                    </div>
                </div>
                <div class="activity-item">
                    <div class="activity-icon">
                        <i class="fas fa-share-alt"></i>
                    </div>
                    <div class="activity-content">
                        <div class="activity-title">代理开始推广活动</div>
                        <div class="activity-time">10分钟前</div>
                    </div>
                </div>
            </div>
            
            <!-- 快速操作入口 -->
            <div class="grid grid-cols-3 gap-4 mt-6">
                <button class="bg-gradient-to-r from-green-400 to-blue-500 text-white py-3 rounded-lg font-semibold">
                    <i class="fas fa-plus mr-2"></i>创建活动
                </button>
                <button class="bg-gradient-to-r from-purple-400 to-pink-500 text-white py-3 rounded-lg font-semibold">
                    <i class="fas fa-users mr-2"></i>代理管理
                </button>
                <button class="bg-gradient-to-r from-yellow-400 to-red-500 text-white py-3 rounded-lg font-semibold">
                    <i class="fas fa-chart-bar mr-2"></i>数据统计
                </button>
            </div>
        </div>
        
        <!-- 底部导航栏 -->
        <div class="tab-bar">
            <div class="tab-item active">
                <i class="fas fa-home text-xl mb-1"></i>
                <span>首页</span>
            </div>
            <div class="tab-item">
                <i class="fas fa-tasks text-xl mb-1"></i>
                <span>任务</span>
            </div>
            <div class="tab-item">
                <i class="fas fa-chart-line text-xl mb-1"></i>
                <span>数据</span>
            </div>
            <div class="tab-item">
                <i class="fas fa-user text-xl mb-1"></i>
                <span>我的</span>
            </div>
        </div>
    </div>
</body>
</html>
