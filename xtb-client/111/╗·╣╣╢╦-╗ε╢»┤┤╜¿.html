<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校推宝Pro - 机构端活动创建</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #f6f6f6;
            overflow: hidden;
        }
        .container {
            width: 375px;
            height: 812px;
            background: white;
            position: relative;
            overflow: hidden;
        }
        .mockup {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            border: 12px solid #000;
            border-radius: 40px;
            box-sizing: border-box;
        }
        .status-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: white;
            font-size: 14px;
        }
        .content {
            height: calc(100% - 44px - 60px);
            overflow-y: auto;
            padding: 16px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .content::-webkit-scrollbar {
            display: none;
        }
        .tab-bar {
            background: white;
            height: 60px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-around;
            opacity: 1;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-size: 12px;
        }
        .tab-item.active {
            color: #764ba2;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .form-textarea {
            height: 100px;
            resize: vertical;
        }
        .form-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 12px center;
            background-repeat: no-repeat;
            background-size: 16px;
            padding-right: 40px;
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .upload-area {
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            color: #6b7280;
            cursor: pointer;
        }
        .upload-area:hover {
            border-color: #667eea;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mockup"></div>
        
        <!-- 状态栏 -->
        <div class="status-bar">
            <div>9:41</div>
            <div>
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-three-quarters"></i>
            </div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">创建活动</h1>
            
            <div class="form-group">
                <label class="form-label">活动标题</label>
                <input type="text" class="form-input" placeholder="请输入活动标题">
            </div>
            
            <div class="form-group">
                <label class="form-label">活动类型</label>
                <select class="form-input form-select">
                    <option value="">请选择活动类型</option>
                    <option value="training">培训课程</option>
                    <option value="competition">竞赛活动</option>
                    <option value="workshop">工作坊</option>
                    <option value="seminar">研讨会</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">活动时间</label>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-sm text-gray-600 mb-2 block">开始时间</label>
                        <input type="date" class="form-input">
                    </div>
                    <div>
                        <label class="text-sm text-gray-600 mb-2 block">结束时间</label>
                        <input type="date" class="form-input">
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">目标人数</label>
                <input type="number" class="form-input" placeholder="请输入目标参与人数">
            </div>
            
            <div class="form-group">
                <label class="form-label">活动地点</label>
                <input type="text" class="form-input" placeholder="请输入活动地点">
            </div>
            
            <div class="form-group">
                <label class="form-label">活动描述</label>
                <textarea class="form-input form-textarea" placeholder="请输入活动详细描述"></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label">活动封面</label>
                <div class="upload-area">
                    <i class="fas fa-cloud-upload-alt text-3xl mb-2"></i>
                    <div>点击上传活动封面图片</div>
                    <div class="text-sm text-gray-500 mt-1">支持 JPG、PNG 格式，最大 5MB</div>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">参与要求</label>
                <textarea class="form-input form-textarea" placeholder="请输入参与活动的要求和条件"></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label">奖励设置</label>
                <textarea class="form-input form-textarea" placeholder="请输入活动奖励设置"></textarea>
            </div>
            
            <button class="submit-btn">
                <i class="fas fa-plus mr-2"></i>创建活动
            </button>
        </div>
        
        <!-- 底部导航栏 -->
        <div class="tab-bar">
            <div class="tab-item">
                <i class="fas fa-home text-xl mb-1"></i>
                <span>首页</span>
            </div>
            <div class="tab-item">
                <i class="fas fa-tasks text-xl mb-1"></i>
                <span>任务</span>
            </div>
            <div class="tab-item">
                <i class="fas fa-plus text-xl mb-1"></i>
                <span>创建</span>
            </div>
            <div class="tab-item">
                <i class="fas fa-user text-xl mb-1"></i>
                <span>我的</span>
            </div>
        </div>
    </div>
</body>
</html>
